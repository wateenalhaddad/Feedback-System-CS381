<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Feedback</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<nav>
  <div class="logo-wrapper">
    <img src="images/logo.jpeg" alt="Logo" class="nav-logo">
    <span class="logo">Feedback Portal</span>
  </div>
  <button class="hamburger"><span></span><span></span><span></span></button>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="dashboard.html" class="active">My Feedback</a></li>
    <li><a href="submit.html">Submit</a></li>
    <li><a href="#" id="logoutBtn">Logout</a></li>
  </ul>
</nav>
<main>
  <div class="page-header"><h1>Student Dashboard</h1><a href="submit.html" class="btn btn-primary">New Feedback</a></div>
  <div style="display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1.5rem;">
    <div class="card" style="flex:1; text-align:center;"><div style="font-size:2rem;" id="totalCount">0</div><div>Total</div></div>
    <div class="card" style="flex:1; text-align:center;"><div style="font-size:2rem;" id="pendingCount">0</div><div>Pending</div></div>
    <div class="card" style="flex:1; text-align:center;"><div style="font-size:2rem;" id="reviewedCount">0</div><div>Reviewed / Resolved</div></div>
  </div>
  <div class="card"><h2>Your submitted feedback</h2><ul class="feedback-list" id="studentFeedbackList"></ul></div>
</main>
<footer>© 2026 Feedback Portal — University Project</footer>
<div class="overlay" id="confirmOverlay"><div class="dialog"><h3>Are you sure?</h3><p id="confirmMsg"></p><div class="dialog-btns"><button class="btn btn-danger" id="confirmYes">Yes</button><button class="btn btn-primary" id="confirmNo">Cancel</button></div></div></div>
<script src="js/script.js"></script>
</body>
</html>
