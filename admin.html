<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<nav>
  <div class="logo-wrapper">
    <img src="images/logo.jpeg" alt="Logo" class="nav-logo">
    <span class="logo">Feedback Portal</span>
  </div>
  <button class="hamburger"><span></span><span></span><span></span></button>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="admin.html" class="active">Admin</a></li>
    <li><a href="#" id="logoutBtn">Logout</a></li>
  </ul>
</nav>
<main>
  <div class="page-header"><h1>Admin Panel</h1><span>Manage all feedback</span></div>
  <div style="display:flex; gap:1rem; flex-wrap:wrap;">
    <div class="card" style="flex:1; text-align:center;"><div style="font-size:2rem;" id="adminTotal">0</div><div>Total</div></div>
    <div class="card" style="flex:1; text-align:center;"><div style="font-size:2rem;" id="adminPending">0</div><div>Pending</div></div>
    <div class="card" style="flex:1; text-align:center;"><div style="font-size:2rem;" id="adminReviewed">0</div><div>Reviewed</div></div>
  </div>
  <div class="card">
    <h2>All feedback</h2>
    <div style="margin-bottom:1rem;"><label>Filter by status: </label><select id="statusFilter"><option value="all">All</option><option value="pending">Pending</option><option value="reviewed">Reviewed</option><option value="resolved">Resolved</option></select></div>
    <div style="overflow-x:auto;"><table class="admin-table"><thead><tr><th>Student</th><th>Category</th><th>Feedback</th><th>Status</th><th>Actions</th></tr></thead><tbody id="adminFeedbackBody"></tbody></table></div>
  </div>
</main>
<footer>© 2026 Feedback Portal — University Project</footer>
<div class="overlay" id="confirmOverlay"><div class="dialog"><h3>Are you sure?</h3><p id="confirmMsg"></p><div class="dialog-btns"><button class="btn btn-danger" id="confirmYes">Yes</button><button class="btn btn-primary" id="confirmNo">Cancel</button></div></div></div>
<script src="js/script.js"></script>
</body>
</html>
