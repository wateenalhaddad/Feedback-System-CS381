<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register · Feedback Portal</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<nav>
  <div class="logo-wrapper">
    <img src="images/logo.jpeg" alt="Logo" class="nav-logo">
    <span class="logo">Feedback Portal</span>
  </div>
  <button class="hamburger"><span></span><span></span><span></span></button>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="login.html">Login</a></li>
    <li><a href="register.html" class="active">Register</a></li>
  </ul>
</nav>
<div class="login-wrapper">
  <div class="login-box">
    <h1>Create Account</h1>
    <p>Join the feedback portal</p>
    <form id="registerForm" novalidate>
      <div class="form-group">
        <label for="regName">Full Name</label>
        <input type="text" id="regName" placeholder="Your full name" required minlength="2">
        <span class="error-msg"></span>
      </div>
      <div class="form-group">
        <label for="regEmail">Email</label>
        <input type="email" id="regEmail" placeholder="you@university.edu" required>
        <span class="error-msg"></span>
      </div>
      <div class="form-group">
        <label for="regRole">Role</label>
        <select id="regRole" required>
          <option value="">Select role</option>
          <option value="student">Student</option>
          <option value="admin">Admin</option>
        </select>
        <span class="error-msg"></span>
      </div>
      <div class="form-group">
        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" placeholder="••••••" required minlength="6">
        <span class="error-msg"></span>
      </div>
      <div class="form-group">
        <label for="regConfirm">Confirm Password</label>
        <input type="password" id="regConfirm" placeholder="••••••" required>
        <span class="error-msg"></span>
      </div>
      <button type="submit" class="btn btn-primary full-width">Register</button>
    </form>
    <p style="text-align:center; margin-top:1.2rem; font-size:0.9rem;">
      Already have an account? <a href="login.html" style="color:var(--accent); font-weight:500;">Login here</a>
    </p>
  </div>
</div>
<footer>© 2026 Feedback Portal — University Project</footer>
<div class="overlay" id="confirmOverlay">
  <div class="dialog">
    <h3>Are you sure?</h3>
    <p id="confirmMsg"></p>
    <div class="dialog-btns">
      <button class="btn btn-danger" id="confirmYes">Yes</button>
      <button class="btn btn-primary" id="confirmNo">Cancel</button>
    </div>
  </div>
</div>
<script src="js/script.js"></script>
</body>
</html>
