<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Feedback</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<nav>
  <div class="logo-wrapper">
    <img src="images/logo.jpeg" alt="Logo" class="nav-logo">
    <span class="logo">Feedback Portal</span>
  </div>
  <button class="hamburger"><span></span><span></span><span></span></button>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="dashboard.html">My Feedback</a></li>
    <li><a href="submit.html" class="active">Submit</a></li>
    <li><a href="#" id="logoutBtn">Logout</a></li>
  </ul>
</nav>
<main>
  <div class="page-header"><h1>Share your feedback</h1><a href="dashboard.html" class="btn btn-outline">Back</a></div>
  <div class="card" style="max-width:600px; margin:0 auto;">
    <form id="feedbackForm" novalidate>
      <div class="form-group">
        <label for="feedbackType">Category</label>
        <select id="feedbackType" required>
          <option value="">Select a category</option>
          <option value="course">Course</option>
          <option value="service">Campus Service</option>
          <option value="facility">Facility</option>
          <option value="other">Other</option>
        </select>
        <span class="error-msg"></span>
      </div>
      <div class="form-group">
        <label for="target">Course / Service name</label>
        <input type="text" id="target" placeholder="e.g. Database Systems, Library" required>
        <span class="error-msg"></span>
      </div>
      <div class="form-group">
        <label for="message">Your message</label>
        <textarea id="message" rows="4" placeholder="Write your feedback here..." required minlength="10" maxlength="500"></textarea>
        <span class="error-msg"></span>
      </div>
      <button type="submit" class="btn btn-primary full-width">Submit feedback</button>
    </form>
  </div>
</main>
<footer>© 2026 Feedback Portal — University Project</footer>
<div class="overlay" id="confirmOverlay"><div class="dialog"><h3>Are you sure?</h3><p id="confirmMsg"></p><div class="dialog-btns"><button class="btn btn-danger" id="confirmYes">Yes</button><button class="btn btn-primary" id="confirmNo">Cancel</button></div></div></div>
<script src="js/script.js"></script>
</body>
</html>
